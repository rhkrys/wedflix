name: Deploy WEDFLIX to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables GitHub Pages (build type = GitHub Actions) if it isn't already
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # The site is a static site served from the repo root
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
